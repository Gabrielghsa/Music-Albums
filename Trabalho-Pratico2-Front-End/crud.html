<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/cadastro.css">
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-md">
            <div class="container-fluid">
                <img src="logo.png" width="40" alt="Logo">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuTopo"> ☰
                </button>
                <div class="collapse navbar-collapse" id="menuTopo">
                    <ul class="navbar-nav ms-3">
                        <li class="nav-item">
                            <a class="nav-link" href="index.html">
                                Inicio
                            </a>
                        </li>
                        <li class="nav-item" id="item-login">
                            <a class="nav-link" href="login.html">
                                Login
                            </a>
                        </li>
                        <li class="nav-item d-none" id="item-favoritos">
                            <a class="nav-link" href="favoritos.html">
                                Favoritos
                            </a>
                        </li>
                        <li class="nav-item d-none" id="item-cadastro">
                            <a class="nav-link" href="crud.html">
                                Cadastro
                            </a>
                        </li>
                        <li class="nav-item d-none" id="item-logout">
                            <a class="nav-link" href="#" id="btnLogout">
                                Logout
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>
    <main class="container my-5">
        <h1 class="mb-4 text-center">
            Cadastro de Álbuns
        </h1>
        <form id="formAlbum">
            <input type="hidden" id="albumId">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">
                        Nome do Álbum
                    </label>
                    <input type="text" class="form-control" id="nome" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">
                        Banda
                    </label>
                    <input type="text" class="form-control" id="banda" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">
                        Gênero
                    </label>
                    <input type="text" class="form-control" id="genero" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">
                        Ano
                    </label>
                    <input type="number" class="form-control" id="ano" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">
                        Gravadora
                    </label>
                    <input type="text" class="form-control" id="gravadora">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">
                        Vendas
                    </label>
                    <input type="text" class="form-control" id="vendas">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">
                        Maior Sucesso
                    </label>
                    <input type="text" class="form-control" id="maiorSucesso">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">
                        Imagem
                    </label>
                    <input type="text" class="form-control" id="imagem">
                </div>
                <div class="col-12 mb-3">
                    <label class="form-label">
                        Banner
                    </label>
                    <input type="text" class="form-control" id="banner">
                </div>
                <div class="col-12 mb-4">
                    <label class="form-label">
                        Músicas (uma por linha)
                    </label>
                    <textarea class="form-control" id="musicas" rows="8"></textarea>
                </div>
            </div>
            <button type="submit" class="btn btn-danger">
                Salvar Álbum
            </button>
            <button type="reset" class="btn btn-secondary"> 
                Limpar
            </button>
        </form>
        <hr class="my-5">
        <h2 class="mb-4">
            Álbuns Cadastrados
        </h2>
        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Banda</th>
                        <th>Ano</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabelaAlbums">
                </tbody>
            </table>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/crud.js"></script>
</body>
</html>
