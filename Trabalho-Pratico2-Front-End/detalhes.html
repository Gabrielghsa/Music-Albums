<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Álbum</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-md">
            <div class="container-fluid">
                <img src="logo.png" width="40" alt="Logo">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuTopo">
                    ☰
                </button>
                <div class="collapse navbar-collapse" id="menuTopo">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="index.html">
                                Inicio
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container-fluid detalhes-main py-5">

        <section class="container">
            <div class="row align-items-center g-5">
                <article class="col-12 col-lg-5">
                    <div class="album-image-container text-center">
                        <!--Imagem do álbum -->
                        <img id="album-image" src="" alt="Imagem do álbum" class="img-fluid rounded shadow">
                    </div>
                </article>
                
                <article class="col-12 col-lg-7">
                    <!-- Informações dos álbuns -->
                    <div class="album-details p-4 rounded">

                        <h1 id="album-name" class="mb-4">
                            Nome do Álbum
                        </h1>

                        <h2 id="album-band" class="h4 mb-4">
                            Nome da Banda
                        </h2>

                        <div class="album-info">
                            <p>
                                <strong>
                                    Ano de Lançamento:
                                </strong>
                                <span id="album-year">
                                    ----
                                </span>
                            </p>

                            <p>
                                <strong>
                                    Gravadora:
                                </strong>
                                <span id="album-label">
                                    ----
                                </span>
                            </p>

                            <p>
                                <strong>
                                    Vendas:
                                </strong>
                                <span id="album-sales">
                                    ----
                                </span>
                            </p>

                            <p>
                                <strong>
                                    Maior Sucesso:
                                </strong>
                                <span id="album-hit">
                                    ----
                                </span>
                            </p>

                        </div>
                
                        <div class="mt-5 d-flex gap-3">
                            <a href="index.html" class="btn btn-danger">
                                Voltar
                            </a>
                        </div>
                    </div>
                </article>
            </div>
    
            <section class="mt-5">
                <div class="album-details p-4 rounded">
                    <h3 class="mb-4">
                        Músicas do Álbum
                    </h3>
                    <ul id="album-musics" class="list-group">
                    </ul>
                </div>
            </section>
        </section>
    </main>

    <footer class="text-center p-3">

        <p>&copy; 2026</p>

    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/script.js"></script>

</body>
</html>
